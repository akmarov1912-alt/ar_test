<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      /* Стиль для экрана загрузки */
      #scanning-overlay { display: flex; align-items: center; justify-content: center; position: absolute; left: 0; right: 0; top: 0; bottom: 0; background: rgba(0,0,0,0.5); color: white; z-index: 10; font-family: sans-serif; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    
    <div id="scanning-overlay">
      <p>Жди... Гружу AR-модуль и видео...</p>
    </div>

    <a-scene mindar-image="imageTargetSrc: targets.mind; uiScanning: #scanning-overlay;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="arVideo" src="video.mp4" preload="auto" response-type="arraybuffer" loop crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#arVideo" width="1" height="1" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const video = document.querySelector("#arVideo");
      const overlay = document.querySelector("#scanning-overlay");

      // Скрываем надпись, когда всё готово
      sceneEl.addEventListener("arReady", (event) => {
        overlay.innerHTML = "<p>Наведи на фото!</p>";
        setTimeout(() => { overlay.classList.add("hidden"); }, 2000);
      });

      // Запуск видео при нахождении маркера
      sceneEl.addEventListener("targetFound", event => {
        video.play();
      });

      // Пауза, если потерял маркер
      sceneEl.addEventListener("targetLost", event => {
        video.pause();
      });
    </script>
  </body>
</html>
