<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        /* Убираем всё лишнее, что может давать белый экран */
        body { margin: 0; overflow: hidden; background: none; }
        .mindar-ui-overlay { z-index: 100 !important; }
        #playBtn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 9999; padding: 15px 30px; background: #00f3ff; color: #000;
            border: none; border-radius: 10px; font-weight: bold; display: none;
            box-shadow: 0 0 20px rgba(0,243,255,0.5);
        }
    </style>
</head>
<body>
    <button id="playBtn">ВКЛЮЧИТЬ ЗВУК</button>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: yes;" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true, alpha: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="arVideo" src="video.mp4" preload="auto" loop crossorigin="anonymous" playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#arVideo" width="1" height="1.77" position="0 0 0" material="shader: flat; transparent: true"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const video = document.querySelector('#arVideo');
        const btn = document.querySelector('#playBtn');
        const sceneEl = document.querySelector('a-scene');

        // Когда маркер НАЙДЕН
        sceneEl.addEventListener('targetFound', () => {
            console.log("Маркер обнаружен!");
            video.play();
            btn.style.display = 'block';
        });

        // Когда маркер ПОТЕРЯН
        sceneEl.addEventListener('targetLost', () => {
            console.log("Маркер потерян.");
            video.pause();
            btn.style.display = 'none';
        });

        // Кнопка для звука (обязательна для мобилок)
        btn.addEventListener('click', () => {
            video.muted = false;
            btn.style.display = 'none';
        });

        // Если за 10 секунд камера не завелась - пишем в консоль
        sceneEl.addEventListener('arError', (event) => {
            alert("Ошибка камеры! Проверь разрешения.");
        });
    </script>
</body>
</html>
