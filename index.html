<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #playBtn {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; padding: 15px 25px; background: #00f3ff; border: none; 
            border-radius: 10px; font-weight: bold; display: none;
        }
    </style>
</head>
<body>
    <button id="playBtn">ВКЛЮЧИТЬ ЗВУК</button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: yes;" 
             embedded color-space="sRGB" renderer="colorManagement: true, alpha: true" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="arVideo" src="video.mp4" preload="auto" loop crossorigin="anonymous" playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#arVideo" width="1" height="1.77" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const video = document.querySelector('#arVideo');
        const btn = document.querySelector('#playBtn');
        const sceneEl = document.querySelector('a-scene');

        sceneEl.addEventListener('targetFound', () => {
            video.play();
            btn.style.display = 'block';
        });

        sceneEl.addEventListener('targetLost', () => {
            video.pause();
            btn.style.display = 'none';
        });

        btn.addEventListener('click', () => {
            video.muted = false;
            btn.style.display = 'none';
        });
    </script>
</body>
</html>
